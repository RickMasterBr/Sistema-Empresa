<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionarios</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>AV3 – Sistema Empresa (Node.js + MySQL + Frontend)</h1>
    </header>

    <div>

        <h1>Cadastro de Funcionário</h1>

        <form id="cadastro" class="formulario">
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome..." required>
            <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF..." required>
            <input type="text" id="funcao" name="funcao" placeholder="Digite sua função..." required>

            <input type="submit" id="btnCadastrar" value="Cadastrar">
        </form>

        <p>Funcionarios</p>

        <div id="resultado">


        </div>
        
    </div>

    <script src="index.js"></script>
</body>

</html>
